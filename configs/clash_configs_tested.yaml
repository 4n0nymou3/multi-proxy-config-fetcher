          8080
        ]
      },
      "TLS": {
        "ports": [
          443,
          8443,
          2053,
          2083,
          2087,
          2096
        ]
      }
    }
  },
  "dns": {
    "enable": true,
    "respect-rules": true,
    "use-system-hosts": false,
    "listen": "127.0.0.1:1053",
    "ipv6": false,
