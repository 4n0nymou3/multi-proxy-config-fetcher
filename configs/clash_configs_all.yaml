{
  "mixed-port": 7890,
  "allow-lan": false,
  "unified-delay": false,
  "log-level": "silent",
  "mode": "rule",
  "tcp-concurrent": true,
  "geo-auto-update": true,
  "geo-update-interval": 168,
  "external-controller": "127.0.0.1:9090",
  "external-ui": "ui",
  "profile": {
    "store-selected": true,
    "store-fake-ip": true
  },
  "tun": {
    "enable": true,
    "stack": "mixed",
    "auto-route": true,
    "strict-route": true,
    "auto-detect-interface": true,
    "dns-hijack": [
      "any:53",
      "tcp://any:53"
    ],
    "mtu": 9000
  },
  "sniffer": {
    "enable": true,
    "force-dns-mapping": true,
    "parse-pure-ip": true,
    "override-destination": true,
    "sniff": {
      "HTTP": {
        "ports": [
          80,
          8080
        ]
      },
      "TLS": {
        "ports": [
          443,
          8443,
          2053,
          2083,
          2087,
          2096
        ]
      }
    }
  },
  "dns": {
    "enable": true,
    "respect-rules": true,
    "use-system-hosts": false,
    "listen": "127.0.0.1:1053",
    "ipv6": false,
    "nameserver": [
      "https://8.8.8.8/dns-query#✅ Anonymous Multi"
    ],
    "proxy-server-nameserver": [
      "8.8.8.8#DIRECT"
    ],
    "direct-nameserver": [
      "8.8.8.8#DIRECT"
    ],
    "direct-nameserver-follow-policy": true,
    "nameserver-policy": {
      "rule-set:geosite-ir": "8.8.8.8#DIRECT"
    },
    "enhanced-mode": "fake-ip",
    "fake-ip-range": "198.18.0.1/16",
    "fake-ip-filter-mode": "blacklist",
    "fake-ip-filter": [
      "+.lan",
      "+.local"
    ]
  },
